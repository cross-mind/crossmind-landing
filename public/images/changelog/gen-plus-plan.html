<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&family=Sora:wght@700;800&family=Space+Mono&display=swap" rel="stylesheet">
<style>
  html { zoom: 2; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 580px;
    height: 380px;
    background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Sans', -apple-system, sans-serif;
    position: relative;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: linear-gradient(rgba(45,91,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(45,91,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  .glow-blue {
    position: absolute;
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(45,91,255,0.15) 0%, transparent 70%);
    top: -80px; right: -80px;
    border-radius: 50%;
  }
  .glow-cyan {
    position: absolute;
    width: 250px; height: 250px;
    background: radial-gradient(circle, rgba(0,212,255,0.12) 0%, transparent 70%);
    bottom: -60px; left: -60px;
    border-radius: 50%;
  }
  .card {
    position: relative;
    z-index: 1;
    width: 460px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 32px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #2D5BFF;
  }
  .title {
    font-family: 'Sora', sans-serif;
    font-size: 22px;
    font-weight: 800;
    color: #ffffff;
    letter-spacing: -0.5px;
    line-height: 1.2;
  }
  .title span {
    background: linear-gradient(90deg, #2D5BFF, #00D4FF);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .plans {
    display: flex;
    gap: 12px;
  }
  .plan {
    flex: 1;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .plan.highlighted {
    border-color: rgba(45,91,255,0.4);
    background: rgba(45,91,255,0.08);
    position: relative;
  }
  .plan-badge {
    position: absolute;
    top: -10px;
    left: 50%;
    transform: translateX(-50%);
    background: linear-gradient(90deg, #2D5BFF, #00D4FF);
    color: #fff;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 100px;
    white-space: nowrap;
  }
  .plan-name {
    font-family: 'Sora', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: #fff;
  }
  .plan-price {
    font-family: 'Sora', sans-serif;
    font-size: 20px;
    font-weight: 800;
    color: #fff;
  }
  .plan-price sub {
    font-size: 12px;
    font-weight: 400;
    color: #888;
  }
  .plan-feature {
    font-size: 11px;
    color: #888;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .plan-feature.plus { color: #00D4FF; }
  .check { color: #10b981; font-size: 12px; }
  .x-mark { color: #555; font-size: 12px; }
  .arrow { color: #00D4FF; font-size: 14px; }
</style>
</head>
<body>
  <div class="glow-blue"></div>
  <div class="glow-cyan"></div>
  <div class="card">
    <div>
      <div class="label">Billing · New</div>
      <div class="title" style="margin-top:8px;">Now available: <span>Plus Plan</span></div>
    </div>
    <div class="plans">
      <div class="plan">
        <div class="plan-name">Starter</div>
        <div class="plan-price">$29<sub>/mo</sub></div>
        <div class="plan-feature"><span class="check">✓</span> 3 workspace slots</div>
        <div class="plan-feature"><span class="check">✓</span> Core integrations</div>
        <div class="plan-feature"><span class="x-mark">×</span> Unlimited slots</div>
      </div>
      <div class="plan highlighted">
        <div class="plan-badge">New</div>
        <div class="plan-name">Plus</div>
        <div class="plan-price">$99<sub>/mo</sub></div>
        <div class="plan-feature plus"><span class="arrow">→</span> <strong>No slot limits</strong></div>
        <div class="plan-feature plus"><span class="check">✓</span> All integrations</div>
        <div class="plan-feature plus"><span class="check">✓</span> Priority execution</div>
      </div>
    </div>
  </div>
</body>
</html>
